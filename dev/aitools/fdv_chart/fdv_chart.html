================================================================ */
function onChartTypeChange() {
    var ct      = document.getElementById('chart-type').value;
    var isXOnly = ct === 'histogram' || ct === 'cumproba';
    var isCum   = ct === 'cumproba';
    var isHist  = ct === 'histogram';
    function show(id, vis) { var el=document.getElementById(id); if(el) el.style.display=vis?'':'none'; }
    show('y-col-label',    !isXOnly);
    show('y-regex-label',  !isXOnly);
    show('color-col-label',!isXOnly);
    show('color-rx-label', !isXOnly);
    show('bins-label',      isHist);
    show('split-label',     isCum);
    show('split-rx-label',  isCum);
    show('y-min-label',    !isXOnly);
    show('y-max-label',    !isXOnly);
    show('y-ivlo-label',   !isXOnly);
    show('y-ivhi-label',   !isXOnly);
    show('y-step-label',   !isXOnly);
}

function populatePlotSelectors(headers) {
    currentHeaders = headers;
    ['x-col','y-col','color-col','split-col','split-chart-col'].forEach(function(id) {
        var sel = document.getElementById(id), prev = sel.value;
        sel.innerHTML = (id==='color-col'||id==='split-col'||id==='split-chart-col')
            ? '<option value="">-- none --</option>' : '';
        headers.forEach(function(h) {
            var o = document.createElement('option');
            o.value = h; o.textContent = h; sel.appendChild(o);
        });
        if (prev) sel.value = prev;
    });
    function tryDefault(id, candidates) {
        var sel = document.getElementById(id);
        for (var ci=0; ci<candidates.length; ci++)
            for (var i=0; i<sel.options.length; i++)
                if (sel.options[i].value.toUpperCase()===candidates[ci].toUpperCase()) {
                    sel.value=sel.options[i].value; return;
                }
    }
    tryDefault('x-col',    ['WL','BLK','SB','BL','LINE#']);
    tryDefault('y-col',    ['RBER','BYBER','RBER_LIMIT','Measurement']);
    tryDefault('color-col',['DUT','RESULT','PAGETYPE','Type']);
}

function extractNum(val, rxStr) {
    if (rxStr) {
        try {
            var m = new RegExp(rxStr).exec(String(val));
            if (m) val = (m[1] !== undefined ? m[1] : m[0]);
        } catch(e) {}
    }
    var n = parseFloat(String(val).replace(/[^0-9.eE+\-]/g,''));
    return isNaN(n) ? null : n;
}

function getAxisScale(minId, maxId, stepId) {
    var opts = {};
    var mn   = parseFloat(document.getElementById(minId).value);
    var mx   = parseFloat(document.getElementById(maxId).value);
    if (!isNaN(mn)) opts.min = mn;
    if (!isNaN(mx)) opts.max = mx;
    if (stepId) {
        var st = parseFloat(document.getElementById(stepId).value);
        if (!isNaN(st) && st > 0) {
            opts.ticks = Object.assign(opts.ticks || {}, { stepSize: st });
        }
    }
    return opts;
}

/* Return current data-interval bounds from the purple interval inputs */
function _getIntervals() {
    return {
        xLo: document.getElementById('x-ivlo').value,
        xHi: document.getElementById('x-ivhi').value,
        yLo: document.getElementById('y-ivlo').value,
        yHi: document.getElementById('y-ivhi').value
    };
}

function _clearIntervals() {
    ['x-ivlo','x-ivhi','y-ivlo','y-ivhi'].forEach(function(id){
        document.getElementById(id).value = '';
    });
    drawPlot();
}

/* Brief label shown in plot-status when any interval is active */
function _intervalNote() {
    var iv = _getIntervals();
    var parts = [];
    if (iv.xLo !== '' || iv.xHi !== '') {
        parts.push('X\u2208[' + (iv.xLo || '\u2212\u221e') + ', ' + (iv.xHi || '+\u221e') + ']');
    }
    if (iv.yLo !== '' || iv.yHi !== '') {
        parts.push('Y\u2208[' + (iv.yLo || '\u2212\u221e') + ', ' + (iv.yHi || '+\u221e') + ']');
    }
    return parts.length ? ' | interval: ' + parts.join(', ') : '';
}

/* ================================================================
   MARKER LINES
   State: array of {axis:'x'|'y', value:number, color:string, label:string}
================================================================ */
var _markers = [];

var _MARKER_COLORS = ['#e83e8c','#dc3545','#fd7e14','#28a745','#007bff','#6f42c1','#20c997','#343a40'];

function _markerColorCycle(idx) {
    return _MARKER_COLORS[idx % _MARKER_COLORS.length];
}

function _parseMarkerExpr(raw) {
    /* Format: x=VALUE[:COLOR[:LABEL]]  or  y=VALUE[:COLOR[:LABEL]] */
    raw = raw.trim();
    var m = raw.match(/^([xy])\s*=\s*([^\s:]+)(?::([^:]+))?(?::(.+))?$/i);
    if (!m) return null;
    var v = parseFloat(m[2]);
    if (isNaN(v)) return null;
    return {
        axis:  m[1].toLowerCase(),
        value: v,
        color: (m[3] && m[3].trim()) || null,   /* null → auto from palette */
        label: (m[4] && m[4].trim()) || ''
    };
}

function _rebuildMarkerTags() {
    var list = document.getElementById('marker-tag-list');
    list.innerHTML = '';
    _markers.forEach(function(mk, i) {
        var c   = mk.color || _markerColorCycle(i);
        var tag = document.createElement('span');
        tag.className = 'marker-tag';
        tag.style.borderColor = c;
        tag.style.background  = c + '22';
        tag.style.color       = c;
        var desc = mk.axis.toUpperCase() + '=' + mk.value;
        if (mk.label) desc += ' ' + mk.label;
        tag.innerHTML = escHtml(desc) +
            ' <span class="mk-rm" data-idx="' + i + '" title="Remove">&times;</span>';
        list.appendChild(tag);
    });
    list.querySelectorAll('.mk-rm').forEach(function(rm) {
        rm.addEventListener('click', function() {
            _markers.splice(parseInt(this.dataset.idx), 1);
            _rebuildMarkerTags();
            if (currentCsvId) drawPlot();
        });
    });
}

function _addMarkerFromInput() {
    var inp = document.getElementById('marker-input');
    var raw = inp.value.trim();
    if (!raw) return;
    /* allow comma-separated list */
    raw.split(',').forEach(function(part) {
        var mk = _parseMarkerExpr(part);
        if (mk) _markers.push(mk);
    });
    inp.value = '';
    _rebuildMarkerTags();
    if (currentCsvId) drawPlot();
}

function _clearMarkers() {
    _markers = [];
    _rebuildMarkerTags();
    if (currentCsvId) drawPlot();
}

/* Build the chartjs-plugin-annotation `annotations` object from _markers[] */
function _buildAnnotations() {
    var ann = {};
    _markers.forEach(function(mk, i) {
        var c = mk.color || _markerColorCycle(i);
        var key = 'mk_' + i;
        ann[key] = {
            type: 'line',
            scaleID: mk.axis === 'x' ? 'x' : 'y',
            value: mk.value,
            borderColor: c,
            borderWidth: 1.5,
            borderDash: [5, 4],
            label: mk.label ? {
                display: true,
                content: mk.label,
                position: mk.axis === 'x' ? 'start' : 'end',
                backgroundColor: c + 'cc',
                color: '#fff',
                font: { size: 10 },
                padding: { x: 4, y: 2 },
                yAdjust: mk.axis === 'x' ? -8 : 0
            } : { display: false }
        };
    });
    return ann;
}

/* Wire Enter key on marker input */
document.addEventListener('DOMContentLoaded', function() {
    var mi = document.getElementById('marker-input');
    if (mi) {
        mi.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); _addMarkerFromInput(); }
        });
    }
});

/* ================================================================
   SPLIT-CHART ENGINE
================================================================ */
var _splitInsts = [];   /* Chart instances for split-chart tiles */

function _splitChartKey(row, colIdx, rxStr) {
    if (colIdx < 0) return null;
    var raw = row[colIdx] != null ? String(row[colIdx]) : '(blank)';
    if (!rxStr) return raw;
    try {
        var m = new RegExp(rxStr).exec(raw);
        return m ? (m[1] !== undefined ? m[1] : m[0]) : '(no match)';
    } catch(e) { return raw; }
}

function _applySplitLayout() {
    var grid    = document.getElementById('plot-grid');
    var cols    = Math.max(1, parseInt(document.getElementById('split-chart-cols').value) || 3);
    var tileH   = Math.max(80,  parseInt(document.getElementById('split-chart-h').value)    || 200);
    var gridH   = Math.max(100, parseInt(document.getElementById('split-grid-h').value)     || 340);
    var tiles   = grid.querySelectorAll('.split-tile');
    var tileW   = 'calc(' + (100 / cols).toFixed(4) + '% - 6px)';
    tiles.forEach(function(t) {
        t.style.width  = tileW;
        t.style.height = tileH + 'px';
    });
    grid.style.maxHeight = gridH + 'px';
}

function _destroySplitCharts() {
    _splitInsts.forEach(function(c) { try { c.destroy(); } catch(e) {} });
    _splitInsts = [];
    document.getElementById('plot-grid').innerHTML = '';
}

/* Build one Chart.js config for a tile (reuses the main draw logic but
   accepts pre-filtered points / values and a canvas element). */
function _buildTileChart(canvas, ct, tileData, xCol, yCol, xRx, yRx, colCol, colorRx,
                          xLog, yLog, innerSplitCol, innerSplitRx) {
    var ctx = canvas.getContext('2d');

    function colorKey(pt) {
        if (!colCol) return '(all)';
        var raw = pt.group != null ? String(pt.group) : '(blank)';
        if (!colorRx) return raw;
        try {
            var m = new RegExp(colorRx).exec(raw);
            return m ? (m[1] !== undefined ? m[1] : m[0]) : '(no match)';
        } catch(e) { return raw; }
    }

    function innerSplitKey(pt) {
        if (!innerSplitCol) return '(all)';
        var raw = pt.splitGroup != null ? String(pt.splitGroup) : '(blank)';
        if (!innerSplitRx) return raw;
        try {
            var m = new RegExp(innerSplitRx).exec(raw);
            return m ? (m[1] !== undefined ? m[1] : m[0]) : '(no match)';
        } catch(e) { return raw; }
    }

    var ann = { annotations: _buildAnnotations() };
    var xScale = getAxisScale('x-min', 'x-max', 'x-step');
    var yScale = getAxisScale('y-min', 'y-max', 'y-step');

    /* ── Histogram tile ── */
    if (ct === 'histogram') {
        var vals = tileData.map(function(p) { return p.x; });
        if (!vals.length) return null;
        var userBins = parseInt(document.getElementById('hist-bins').value);
        var nBins    = userBins >= 2 ? userBins : autoBins(vals.length);
        var h        = buildHistBins(vals, nBins);
        return new Chart(ctx, {
            type: 'bar',
            data: {
                labels: h.bins.map(function(b){ return b.toFixed(4); }),
                datasets: [{ label: xCol, data: h.counts,
                    backgroundColor: PALETTE[0] + 'bb', borderColor: PALETTE[0],
                    borderWidth: 1, barPercentage: 1.0, categoryPercentage: 1.0 }]
            },
            options: {
                animation: false, responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false }, annotation: ann,
                    tooltip: { callbacks: {
                        title: function(i){ return 'Centre: ' + i[0].label; },
                        label: function(i){ return 'Count: ' + i.parsed.y; }
                    }}},
                scales: {
                    x: Object.assign({ title: { display: true, text: xCol },
                        ticks: Object.assign({ maxTicksLimit: 8, maxRotation: 45 },
                            (function(){ var s=parseFloat(document.getElementById('x-step').value);
                                         return (!isNaN(s)&&s>0)?{stepSize:s}:{}; })())
                    }, xScale),
                    y: Object.assign({ type: yLog ? 'logarithmic' : 'linear',
                        title: { display: true, text: 'Count' }, beginAtZero: !yLog }, yScale)
                }
            }
        });
    }

    /* ── Cum Proba tile ── */
    if (ct === 'cumproba') {
        /* Group by inner-split col (cumproba split-col) if set,
           else by color-col, matching single-chart cumproba behaviour. */
        var cpGroups = {}, cpOrder = [];
        tileData.forEach(function(pt) {
            var g = innerSplitCol ? innerSplitKey(pt) : colorKey(pt);
            if (!cpGroups[g]) { cpGroups[g] = []; cpOrder.push(g); }
            cpGroups[g].push(pt.x);
        });
        /* deduplicate + sort group keys naturally */
        var cpKeys = cpOrder.filter(function(k,i){ return cpOrder.indexOf(k)===i; })
                            .sort(function(a,b){ return a.localeCompare(b, undefined, {numeric:true}); });
        if (!cpKeys.length) return null;
        var cpDatasets = cpKeys.map(function(g, i) {
            var vals = cpGroups[g].slice().sort(function(a,b){ return a-b; });
            var n    = vals.length;
            return {
                label: g + ' (n=' + n + ')',
                data:  vals.map(function(v,j){ return { x: v, y: (j+1)/n }; }),
                borderColor:     PALETTE[i % PALETTE.length],
                backgroundColor: 'transparent',
                borderWidth: 1.8,
                pointRadius: n <= 1000 ? 2 : 0,
                showLine: true, tension: 0
            };
        });
        return new Chart(ctx, {
            type: 'scatter',
            data: { datasets: cpDatasets },
            options: {
                animation: false, responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: cpDatasets.length > 1, position: 'right',
                              labels: { boxWidth: 10, font: { size: 9 } } },
                    annotation: ann,
                    tooltip: { callbacks: { label: function(i){
                        return i.dataset.label + ': x=' + i.parsed.x.toFixed(6) +
                               ', P=' + (i.parsed.y*100).toFixed(2) + '%';
                    }}}
                },
                scales: {
                    x: Object.assign({ type: xLog ? 'logarithmic' : 'linear',
                        title: { display: true, text: xCol + (xRx ? ' ['+xRx+']' : '') } }, xScale),
                    y: { title: { display: true, text: 'Cum. Proba' }, min: 0, max: 1,
                         ticks: { callback: function(v){ return (v*100).toFixed(0)+'%'; } } }
                }
            }
        });
    }

    /* ── Scatter / Line tile ── */
    var MAX_PTS = 5000;
    var pts = tileData, sampled = false;
    if (pts.length > MAX_PTS && ct !== 'line') {
        var step = Math.ceil(pts.length / MAX_PTS);
        pts = pts.filter(function(_, i){ return i % step === 0; });
        sampled = true;
    }
    var groups = {};
    pts.forEach(function(pt) {
        var g = colorKey(pt);
        if (!groups[g]) groups[g] = [];
        groups[g].push({ x: pt.x, y: pt.y });
    });
    var datasets = Object.keys(groups).map(function(g, i) {
        return { label: g, data: groups[g],
            backgroundColor: PALETTE[i % PALETTE.length] + '99',
            borderColor:     PALETTE[i % PALETTE.length],
            borderWidth: ct === 'line' ? 1.5 : 0,
            pointRadius: ct === 'line' ? 2 : 3, showLine: ct === 'line' };
    });
    return new Chart(ctx, {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
            animation: false, responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { display: datasets.length > 1, position: 'right',
                          labels: { boxWidth: 10, font: { size: 9 } } },
                annotation: ann,
                tooltip: { callbacks: { label: function(ctx) {
                    return ctx.dataset.label + ': (' + ctx.parsed.x + ', ' + ctx.parsed.y + ')';
                }}}
            },
            scales: {
                x: Object.assign({ type: xLog ? 'logarithmic' : 'linear',
                    title: { display: true, text: xCol + (xRx ? ' ['+xRx+']' : '') } }, xScale),
                y: Object.assign({ type: yLog ? 'logarithmic' : 'linear',
                    title: { display: true, text: yCol + (yRx ? ' ['+yRx+']' : '') } }, yScale)
            }
        }
    });
}

function _drawSplitCharts() {
    _destroySplitCharts();

    var ct        = document.getElementById('chart-type').value;
    var xCol      = document.getElementById('x-col').value;
    var yCol      = document.getElementById('y-col').value;
    var xRx       = document.getElementById('x-regex').value.trim();
    var yRx       = document.getElementById('y-regex').value.trim();
    var colCol    = document.getElementById('color-col').value;
    var colorRx   = document.getElementById('color-regex').value.trim();
    var splitCol  = document.getElementById('split-col').value;      /* cumproba inner-split col */
    var splitRx   = document.getElementById('split-regex').value.trim();
    var xLog      = document.getElementById('x-log').checked;
    var yLog      = document.getElementById('y-log').checked;
    var scCol     = document.getElementById('split-chart-col').value;
    var scRx      = document.getElementById('split-chart-rx').value.trim();
    var status    = document.getElementById('plot-status');

    var scIdx = currentHeaders.indexOf(scCol);
    if (scIdx < 0) { status.textContent = 'Split-chart column not found.'; return; }

    /* Collect all points, bucket by split key */
    var isXOnly = ct === 'histogram' || ct === 'cumproba';
    var iv      = _getIntervals();
    var res     = readFilteredFromMemory(xCol, isXOnly ? null : yCol,
                    colCol || null, xRx, isXOnly ? null : yRx,
                    iv.xLo, iv.xHi, isXOnly ? '' : iv.yLo, isXOnly ? '' : iv.yHi);

    /* Attach split key to each point using raw filteredIndices */
    var buckets = {};
    var bucketOrder = [];
    for (var r = 0; r < filteredIndices.length; r++) {
        var row = allRows[filteredIndices[r]];
        var key = _splitChartKey(row, scIdx, scRx) || '(blank)';
        if (!buckets[key]) { buckets[key] = []; bucketOrder.push(key); }
        /* match point index — points were built in same filteredIndices order,
           but readFilteredFromMemory skips non-numeric rows; re-extract here */
        var xv = extractNum(row[currentHeaders.indexOf(xCol)] != null
            ? String(row[currentHeaders.indexOf(xCol)]) : '', xRx);
        var yv = isXOnly ? xv : extractNum(
            row[currentHeaders.indexOf(yCol)] != null
            ? String(row[currentHeaders.indexOf(yCol)]) : '', yRx);
        if (xv === null || (!isXOnly && yv === null)) continue;
        var xLo = iv.xLo !== '' ? parseFloat(iv.xLo) : NaN;
        var xHi = iv.xHi !== '' ? parseFloat(iv.xHi) : NaN;
        var yLo = (!isXOnly && iv.yLo !== '') ? parseFloat(iv.yLo) : NaN;
        var yHi = (!isXOnly && iv.yHi !== '') ? parseFloat(iv.yHi) : NaN;
        if (!isNaN(xLo) && xv < xLo) continue;
        if (!isNaN(xHi) && xv > xHi) continue;
        if (!isNaN(yLo) && yv < yLo) continue;
        if (!isNaN(yHi) && yv > yHi) continue;
        var gi  = colCol   ? currentHeaders.indexOf(colCol)   : -1;
        var si  = splitCol ? currentHeaders.indexOf(splitCol) : -1;
        var pt  = { x: xv, y: isXOnly ? xv : yv };
        if (gi >= 0 && row[gi] != null)  pt.group      = String(row[gi]);
        if (si >= 0 && row[si] != null)  pt.splitGroup = String(row[si]);
        buckets[key].push(pt);
    }

    var keys    = bucketOrder.filter(function(k,i){ return bucketOrder.indexOf(k)===i; })
                             .sort(function(a,b){ return a.localeCompare(b, undefined, {numeric:true}); });
    var grid    = document.getElementById('plot-grid');
    var cols    = Math.max(1, parseInt(document.getElementById('split-chart-cols').value) || 3);
    var tileH   = Math.max(80,  parseInt(document.getElementById('split-chart-h').value)    || 200);
    var gridH   = Math.max(100, parseInt(document.getElementById('split-grid-h').value)     || 340);
    var tileW   = 'calc(' + (100/cols).toFixed(4) + '% - 6px)';
    grid.style.maxHeight = gridH + 'px';
    grid.style.display   = 'flex';

    keys.forEach(function(key, ki) {
        var tile  = document.createElement('div');
        tile.className   = 'split-tile';
        tile.style.width  = tileW;
        tile.style.height = tileH + 'px';

        var titleEl = document.createElement('div');
        titleEl.className   = 'split-tile-title';
        titleEl.textContent = scCol + ' = ' + key + '  (n=' + (buckets[key]||[]).length + ')';
        tile.appendChild(titleEl);

        var canvasWrap = document.createElement('div');
        canvasWrap.className = 'split-tile-canvas';
        var canvas = document.createElement('canvas');
        canvasWrap.appendChild(canvas);
        tile.appendChild(canvasWrap);
        grid.appendChild(tile);

        var inst = _buildTileChart(canvas, ct, buckets[key] || [],
                    xCol, yCol, xRx, yRx, colCol, colorRx, xLog, yLog, splitCol, splitRx);
        if (inst) _splitInsts.push(inst);
    });

    var filtNote = hasActiveFilters() ? ' \u2014 filtered' : '';
    status.textContent = keys.length + ' charts \u00b7 ' + res.points.length.toLocaleString() +
        ' pts \u00b7 split by ' + scCol + (scRx ? ' ['+scRx+']' : '') + filtNote + _intervalNote();
}

function drawPlot() {
    _updatePlotCoverBanner();
    var scCol = document.getElementById('split-chart-col').value;

    /* Toggle between single-chart and split-chart modes */
    var singleArea = document.getElementById('plot-area');
    var gridArea   = document.getElementById('plot-grid');

    if (scCol) {
        /* Split-chart mode */
        if (chartInst) { chartInst.destroy(); chartInst = null; }
        singleArea.style.display = 'none';
        _drawSplitCharts();
        return;
    }

    /* Single-chart mode */
    _destroySplitCharts();
    gridArea.style.display   = 'none';
    singleArea.style.display = '';
    /* Restore a sensible floor if the handle had previously collapsed it */
    if (!singleArea.style.minHeight || parseInt(singleArea.style.minHeight) < 80) {
        singleArea.style.minHeight = '220px';
        singleArea.style.maxHeight = '340px';
    }

    var ct = document.getElementById('chart-type').value;
    if (ct === 'histogram') { drawHistogram(); return; }
    if (ct === 'cumproba')  { drawCumProba();  return; }
    drawScatterLine();
}

/* ── Scatter / Line ──────────────────────────────────────────────────── */
function drawScatterLine() {
    var xCol    = document.getElementById('x-col').value;
    var yCol    = document.getElementById('y-col').value;
    var xRx     = document.getElementById('x-regex').value.trim();
    var yRx     = document.getElementById('y-regex').value.trim();
    var colCol  = document.getElementById('color-col').value;
    var colorRx = document.getElementById('color-regex').value.trim();
    var ct      = document.getElementById('chart-type').value;
    var xLog    = document.getElementById('x-log').checked;
    var yLog    = document.getElementById('y-log').checked;
    var status  = document.getElementById('plot-status');

    if (!currentCsvId) { status.textContent = 'Session expired \u2014 re-parse file.'; return; }
    status.textContent = 'Computing\u2026';

    var iv      = _getIntervals();
    var res     = readFilteredFromMemory(xCol, yCol, colCol || null, xRx, yRx, iv.xLo, iv.xHi, iv.yLo, iv.yHi);
    var points  = res.points;
    var skipped = res.skipped;

    var MAX_PTS = 10000, plotPts = points, sampled = false;
    if (points.length > MAX_PTS && ct !== 'line') {
        var step = Math.ceil(points.length / MAX_PTS);
        plotPts = points.filter(function(_, i){ return i % step === 0; });
        sampled = true;
    }

    function colorKey(pt) {
        if (!colCol) return '(all)';
        var raw = pt.group != null ? String(pt.group) : '(blank)';
        if (!colorRx) return raw;
        try {
            var m = new RegExp(colorRx).exec(raw);
            return m ? (m[1] !== undefined ? m[1] : m[0]) : '(no match)';
        } catch(e) { return raw; }
    }

    var groups = {};
    plotPts.forEach(function(pt) {
        var g = colorKey(pt);
        if (!groups[g]) groups[g] = [];
        groups[g].push({ x: pt.x, y: pt.y });
    });

    var datasets = Object.keys(groups).map(function(g, i) {
        return {
            label: g,
            data: groups[g],
            backgroundColor: PALETTE[i % PALETTE.length] + '99',
            borderColor:     PALETTE[i % PALETTE.length],
            borderWidth: ct === 'line' ? 1.5 : 0,
            pointRadius: ct === 'line' ? 2 : 3,
            showLine: ct === 'line'
        };
    });

    if (chartInst) chartInst.destroy();
    chartInst = new Chart(document.getElementById('plot-canvas').getContext('2d'), {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
            animation: false,
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: datasets.length > 1,
                    position: 'right',
                    labels: { boxWidth: 12, font: { size: 10 } }
                },
                tooltip: { callbacks: {
                    label: function(ctx) {
                        return ctx.dataset.label + ': (' + ctx.parsed.x + ', ' + ctx.parsed.y + ')';
                    }
                }},
                annotation: { annotations: _buildAnnotations() }
            },
            scales: {
                x: Object.assign({
                    type: xLog ? 'logarithmic' : 'linear',
                    title: { display: true,
                             text: xCol + (xRx ? ' [' + xRx + ']' : '') + (xLog ? ' (log)' : '') }
                }, getAxisScale('x-min', 'x-max', 'x-step')),
                y: Object.assign({
                    type: yLog ? 'logarithmic' : 'linear',
                    title: { display: true,
                             text: yCol + (yRx ? ' [' + yRx + ']' : '') + (yLog ? ' (log)' : '') }
                }, getAxisScale('y-min', 'y-max', 'y-step'))
            }
        }
    });

    var filtNote = hasActiveFilters() ? ' \u2014 filtered' : '';
    var sampNote = sampled
        ? ' (sampled ' + plotPts.length.toLocaleString() + '/' + points.length.toLocaleString() + ')' : '';
    status.textContent = points.length.toLocaleString() + ' pts' + sampNote +
        (skipped > 0 ? ', ' + skipped + ' skipped' : '') + filtNote + _intervalNote();
}

/* ── Histogram ───────────────────────────────────────────────────────── */
function autoBins(n) { return Math.min(200, Math.max(2, Math.ceil(Math.log2(n) + 1))); }

function buildHistBins(values, nBins) {
    if (!values.length) return { bins: [], counts: [], width: 0 };
    var mn = Math.min.apply(null, values);
    var mx = Math.max.apply(null, values);
    var w  = (mx - mn || 1) / nBins;
    var bins = [], counts = [];
    for (var i = 0; i < nBins; i++) { bins.push(mn + i*w + w/2); counts.push(0); }
    values.forEach(function(v) {
        var idx = Math.min(nBins - 1, Math.floor((v - mn) / w));
        counts[idx]++;
    });
    return { bins: bins, counts: counts, width: w };
}

function drawHistogram() {
    var xCol   = document.getElementById('x-col').value;
    var xRx    = document.getElementById('x-regex').value.trim();
    var yLog   = document.getElementById('y-log').checked;
    var binsEl = document.getElementById('hist-bins');
    var status = document.getElementById('plot-status');

    if (!currentCsvId) { status.textContent = 'Session expired \u2014 re-parse file.'; return; }
    status.textContent = 'Computing\u2026';

    var iv      = _getIntervals();
    var res     = readFilteredFromMemory(xCol, null, null, xRx, null, iv.xLo, iv.xHi, '', '');
    var vals    = res.points.map(function(p){ return p.x; });
    var skipped = res.skipped;

    if (!vals.length) { status.textContent = 'No numeric values in column ' + xCol; return; }

    var userBins = parseInt(binsEl.value);
    var nBins    = userBins >= 2 ? userBins : autoBins(vals.length);
    var autoLbl  = userBins >= 2 ? '' : ' (auto)';
    var h = buildHistBins(vals, nBins);

    if (chartInst) chartInst.destroy();
    chartInst = new Chart(document.getElementById('plot-canvas').getContext('2d'), {
        type: 'bar',
        data: {
            labels: h.bins.map(function(b){ return b.toFixed(4); }),
            datasets: [{
                label: xCol,
                data: h.counts,
                backgroundColor: PALETTE[0] + 'bb',
                borderColor: PALETTE[0],
                borderWidth: 1,
                barPercentage: 1.0,
                categoryPercentage: 1.0
            }]
        },
        options: {
            animation: false,
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: {
                    title: function(items){ return 'Centre: ' + items[0].label; },
                    label: function(item) { return 'Count: ' + item.parsed.y; }
                }},
                annotation: { annotations: _buildAnnotations() }
            },
            scales: {
                x: Object.assign({
                    title: { display: true, text: xCol + (xRx ? ' [' + xRx + ']' : '') },
                    ticks: Object.assign({ maxTicksLimit: 12, maxRotation: 45 },
                           (function(){ var s=parseFloat(document.getElementById('x-step').value);
                                        return (!isNaN(s)&&s>0)?{stepSize:s}:{}; })())
                }, getAxisScale('x-min', 'x-max')),
                y: Object.assign({
                    type: yLog ? 'logarithmic' : 'linear',
                    title: { display: true, text: 'Count' + (yLog ? ' (log)' : '') },
                    beginAtZero: !yLog
                }, getAxisScale('y-min', 'y-max', 'y-step'))
            }
        }
    });

    var filtNote = hasActiveFilters() ? ' \u2014 filtered' : '';
    status.textContent = vals.length.toLocaleString() + ' values, ' + nBins + ' bins' + autoLbl +
        (skipped > 0 ? ', ' + skipped + ' skipped' : '') + filtNote + _intervalNote();
}

/* ── Cumulative Probability ──────────────────────────────────────────── */
function drawCumProba() {
    var xCol     = document.getElementById('x-col').value;
    var xRx      = document.getElementById('x-regex').value.trim();
    var splitCol = document.getElementById('split-col').value;
    var splitRx  = document.getElementById('split-regex').value.trim();
    var xLog     = document.getElementById('x-log').checked;
    var status   = document.getElementById('plot-status');

    if (!currentCsvId) { status.textContent = 'Session expired \u2014 re-parse file.'; return; }
    status.textContent = 'Computing\u2026';

    var iv      = _getIntervals();
    var res     = readFilteredFromMemory(xCol, null, splitCol || null, xRx, null, iv.xLo, iv.xHi, '', '');
    var points  = res.points;
    var skipped = res.skipped;

    if (!points.length) { status.textContent = 'No numeric values in column ' + xCol; return; }

    function groupKey(pt) {
        if (!splitCol) return '(all)';
        var raw = pt.group != null ? String(pt.group) : '(blank)';
        if (!splitRx) return raw;
        try {
            var m = new RegExp(splitRx).exec(raw);
            return m ? (m[1] !== undefined ? m[1] : m[0]) : '(no match)';
        } catch(e) { return raw; }
    }

    var groups = {};
    points.forEach(function(pt) {
        var g = groupKey(pt);
        if (!groups[g]) groups[g] = [];
        groups[g].push(pt.x);
    });

    var datasets = Object.keys(groups).sort().map(function(g, i) {
        var vals = groups[g].slice().sort(function(a,b){ return a-b; });
        var n    = vals.length;
        return {
            label: g + ' (n=' + n.toLocaleString() + ')',
            data:  vals.map(function(v, j){ return { x: v, y: (j+1)/n }; }),
            borderColor:     PALETTE[i % PALETTE.length],
            backgroundColor: 'transparent',
            borderWidth: 1.8,
            pointRadius: n <= 2000 ? 2 : 0,
            showLine: true,
            tension: 0
        };
    });

    if (chartInst) chartInst.destroy();
    chartInst = new Chart(document.getElementById('plot-canvas').getContext('2d'), {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
            animation: false,
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: true, position: 'right',
                          labels: { boxWidth: 12, font: { size: 10 } } },
                tooltip: { callbacks: {
                    label: function(item) {
                        return item.dataset.label + ': x=' + item.parsed.x.toFixed(6) +
                               ', P=' + (item.parsed.y * 100).toFixed(2) + '%';
                    }
                }},
                annotation: { annotations: _buildAnnotations() }
            },
            scales: {
                x: Object.assign({
                    type: xLog ? 'logarithmic' : 'linear',
                    title: { display: true,
                             text: xCol + (xRx ? ' [' + xRx + ']' : '') + (xLog ? ' (log)' : '') }
                }, getAxisScale('x-min', 'x-max', 'x-step')),
                y: {
                    title: { display: true, text: 'Cumulative Probability' },
                    min: 0, max: 1,
                    ticks: { callback: function(v){ return (v*100).toFixed(0)+'%'; } }
                }
            }
        }
    });

    var filtNote  = hasActiveFilters() ? ' \u2014 filtered' : '';
    var nGroups   = Object.keys(groups).length;
    var splitDesc = splitCol
        ? (' split by ' + splitCol + (splitRx ? ' [' + splitRx + ']' : '')) : '';
    status.textContent = points.length.toLocaleString() + ' values' + splitDesc +
        (nGroups > 1 ? ', ' + nGroups + ' groups' : '') +
        (skipped > 0 ? ', ' + skipped + ' skipped' : '') + filtNote + _intervalNote();
}

/* ── Drag-to-resize plot ─────────────────────────────────────────────── */
(function() {
    var handle   = document.getElementById('drag-handle');
    var dragging = false, startY = 0, startH = 0, targetEl = null;

    handle.addEventListener('mousedown', function(e) {
        /* Pick whichever plot container is currently visible */
        var grid = document.getElementById('plot-grid');
        var area = document.getElementById('plot-area');
        if (grid && grid.style.display !== 'none' && grid.children.length) {
            targetEl = grid;
            startH   = grid.offsetHeight || parseInt(document.getElementById('split-grid-h').value) || 340;
        } else {
            targetEl = area;
            startH   = area.offsetHeight || 220;
        }
        dragging = true;
        startY   = e.clientY;
        document.body.style.cursor = 'ns-resize';
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!dragging || !targetEl) return;
        var newH = Math.max(80, Math.min(1200, startH + e.clientY - startY));
        targetEl.style.maxHeight = newH + 'px';
        targetEl.style.minHeight = newH + 'px';
        /* Keep the split-grid-h input in sync when resizing the grid */
        if (targetEl.id === 'plot-grid') {
            var inp = document.getElementById('split-grid-h');
            if (inp) inp.value = newH;
        }
        if (chartInst) chartInst.resize();
    });

    document.addEventListener('mouseup', function() {
        dragging  = false;
        targetEl  = null;
        document.body.style.cursor = '';
    });
})();
</script>
